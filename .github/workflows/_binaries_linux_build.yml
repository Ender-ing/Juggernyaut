on:
  workflow_call: # Added this line to make it reusable
    inputs:
      linux_system:
        required: false
        type: string
        default: ubuntu-latest
      build_platform:
        required: true
        type: string
      build_platform_name:
        required: true
        type: string
      build_mode:
        required: true
        type: string
      bundle_binaries:
        required: true
        type: boolean

jobs:

  # Linux
  build-binaries-on-ubuntu:
    name: Linux ${{inputs.build_platform_name}}
    runs-on: ${{inputs.linux_system}}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake valgrind

    - name: Install dependencies (32-bits)
      if: inputs.build_platform_name == 'x86_32'
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install gcc-multilib g++-multilib libc6-dev-i386

    - name: Make the ".build" directory
      run: mkdir ${{github.workspace}}/.build

    - name: Configure CMake
      run: cmake .. -DCMAKE_BUILD_TYPE=${{inputs.build_mode}} -DCMAKE_UNIX_GENERATOR_PLATFORM=${{inputs.build_platform}}
      working-directory: .build

    - name: Build
      run: cmake --build . --config ${{inputs.build_mode}} --parallel 3
      working-directory: .build

    # TO-DO: ADD TESTS!

    - name: Extract version (optional)
      if: inputs.bundle_binaries
      run: |
        set -e
        VERSION=$(${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/bin/jug --version | head -n 1)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Upload Binaries Artifact (optional)
      if: inputs.bundle_binaries
      uses: actions/upload-artifact@v4
      with:
        name: Juggernyaut-${{inputs.build_mode}}-v${{env.VERSION}}-Linux-${{inputs.build_platform_name}}
        path: ${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/
