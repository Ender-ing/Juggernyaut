on:
  workflow_call: # Added this line to make it reusable
    inputs:
      linux_system:
        required: false
        type: string
        default: ubuntu-latest
      build_platform:
        required: true
        type: string
      build_platform_name:
        required: true
        type: string
      build_mode:
        required: true
        type: string
      bundle_binaries:
        required: true
        type: boolean
      release_version:
        required: false
        type: string
        default: 0.0.0-github_linux.000
      run_tests:
        type: boolean
        default: true

jobs:

  # Linux
  build-binaries-on-ubuntu:
    name: Linux ${{inputs.build_platform_name}}
    runs-on: ${{inputs.linux_system}}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'c-cpp'

    - name: Setup CMake 4.2+
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.2.x'

    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake valgrind

    - name: Install dependencies (32-bit)
      if: inputs.build_platform_name == 'x86_32'
      run: |
        sudo dpkg --add-architecture i686
        sudo apt-get update
        sudo apt-get install -y gcc-i686-linux-gnu g++-i686-linux-gnu

    - name: Install dependencies (ARM 32-bit)
      if: inputs.build_platform_name == 'arm32'
      run: |
        sudo dpkg --add-architecture armhf
        sudo apt-get update
        sudo apt-get install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
        sudo apt-get install -y libc6:armhf libstdc++6:armhf

    - name: Make the ".build" directory
      run: mkdir ${{github.workspace}}/.build

    - name: Configure CMake
      if: inputs.build_platform_name != 'x86_32' && inputs.build_platform_name != 'arm32'
      run: |
        cmake .. -DCMAKE_BUILD_TYPE=${{inputs.build_mode}} -DCMAKE_UNIX_GENERATOR_PLATFORM=${{inputs.build_platform}} \
          -DJUG_CLEANUP=ON -DJUG_RELEASE_VERSION="${{inputs.release_version}}" -DJUG_BUILD_TESTS=${{inputs.run_tests}}
      working-directory: .build

    - name: Configure CMake (32-bit)
      if: inputs.build_platform_name == 'x86_32'
      run: |
        cmake .. -DCMAKE_BUILD_TYPE=${{inputs.build_mode}} -DCMAKE_UNIX_GENERATOR_PLATFORM=${{inputs.build_platform}} \
          -DCMAKE_C_COMPILER=i686-linux-gnu-gcc -DCMAKE_CXX_COMPILER=i686-linux-gnu-g++ -DCMAKE_SYSTEM_PROCESSOR=i686 \
          -DJUG_CLEANUP=ON -DJUG_RELEASE_VERSION="${{inputs.release_version}}" -DJUG_BUILD_TESTS=${{inputs.run_tests}}
      working-directory: .build

    - name: Configure CMake (ARM 32-bit)
      if: inputs.build_platform_name == 'arm32'
      run: |
        cmake .. -DCMAKE_BUILD_TYPE=${{inputs.build_mode}} -DCMAKE_UNIX_GENERATOR_PLATFORM=${{inputs.build_platform}} \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -DCMAKE_SYSTEM_PROCESSOR=arm \
          -DJUG_CLEANUP=ON -DJUG_RELEASE_VERSION="${{inputs.release_version}}" -DJUG_BUILD_TESTS=${{inputs.run_tests}}
      working-directory: .build

    - name: Build
      run: cmake --build . --config ${{inputs.build_mode}} --parallel 3 --verbose
      working-directory: .build

    - name: Run Tests (optional)
      if: inputs.run_tests
      run: ctest -C ${{inputs.build_mode}} -V
      working-directory: .build

    - name: Extract version (optional)
      if: inputs.bundle_binaries
      run: |
        set -e
        VERSION=$(${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/bin/jug --version \
          | head -n 1)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Cleanup (optional)
      if: inputs.bundle_binaries
      run: ./${{inputs.build_platform_name}}.cleanup.sh
      working-directory: .dist/${{inputs.build_mode}}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"

    - name: Upload Binaries Artifact (optional)
      if: inputs.bundle_binaries
      uses: actions/upload-artifact@v7
      with:
        name: Juggernyaut-${{inputs.build_mode}}-v${{env.VERSION}}-Linux-${{inputs.build_platform_name}}
        path: ${{github.workspace}}/.dist/${{inputs.build_mode}}/${{inputs.build_platform_name}}/
